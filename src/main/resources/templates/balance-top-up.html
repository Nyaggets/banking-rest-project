<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="../static/css/style.css" rel="stylesheet">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <title>Пополнение баланса</title>
</head>

<body>
  <div id="spinner" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; justify-content: center; 
  align-items: center; background: #fcfcfc; z-index: 9999;">
    <div class="spinner-grow text-primary" role="status" style="width: 3rem; height: 3rem; background-color: #f67737;">
      <span class="visually-hidden">Загрузка...</span>
    </div>
  </div>

  <div class="toast position-fixed mt-3 top-0 start-50 translate-middle-x" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true" data-bs-delay="1900">
    <div class="toast-header">
      <strong class="me-auto" id="toast-header"></strong>
      <small>Только что</small>
      <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
    <div class="toast-body" id="toast-body">
    </div>
  </div>

  <div class="modal fade" id="logout-modal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Подтверждение действия</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p>Выйти из аккаунта?</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="secondary-btn modal-dismiss-btn" data-bs-dismiss="modal" autofocus>Отмена</button>
          <a href="logout" role="button" class="btn btn-danger btn-link">Выйти</a>
        </div>
      </div>
    </div>
  </div>

  <header class="header container">
    <nav class="navbar navbar-expand-lg">
      <a class="navbar-brand nav-link" href="main">M·Банк</a>
      <div class="profile-actions">
        <a href="profile" class="nav-link"><i class="fa fa-user" aria-hidden="true"></i><label id="profile-login"></label></a>
        <a class="nav-link" data-bs-toggle="modal" data-bs-target="#logout-modal"><i class="fa fa-sign-out fa-flip-horizontal p-0" aria-hidden="true"></i></a>
      </div>
    </div>
    </nav>
  </header>

  <main>
    <div class="main-container container">
      <div class="transfer-container">
        <h2>Пополнение баланса</h2>
        <div class="container">
          <form id="phone-form" class="row">
            <div class="transfer-field col-12 col-md-5">
              <h3>Номер телефона</h3>
              <input type="text" name="phone" id="phone" placeholder="8 902 232 32 32" maxlength="30" autocomplete="off" required>
              <div error-for="phone" class="error-msg" hidden></div>
              <p id="receiver-name" class="caption" hidden></p> 
              <div error-for="receiver" class="error-msg" hidden></div>
            </div>
            <div class="col col-md-1"></div>
            <div class="transfer-field col-12 col-md-5 d-flex align-items-end mb-4">
              <button type="button" class="secondary-btn" id="my-phone-btn" style="margin-bottom: 20px;">Пополнить мой телефон</button>
            </div>
            <div class="transfer-field col-12 col-md-5">
              <h3>Сумма перевода</h3>
              <div class="d-flex align-items-center gap-2 pe-2">
                <input type="text" name="amount" id="amount" autocomplete="off" required maxlength="30">
                <label class="flex-shrink-0 mb-0 fs-5">₽</label>
              </div>
              <div error-for="amount" class="error-msg" hidden></div>
            </div>
            <div class="col col-md-1"></div>
            <div class="transfer-field col-12 col-md-5">
              <h3>Карта списания</h3>
              <select name="sender" id="sender-cards-select" required></select>
              <div error-for="sender" class="error-msg" hidden></div>
            </div>
            <div class="col-12 col-md-5">
              <button type="submit" class="main-btn" id="withdrawal-btn">Пополнить</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/static/js/balance-top-up.js"></script>
</body>
</html>
