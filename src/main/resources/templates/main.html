<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://getbootstrap.com/docs/5.3/assets/css/docs.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="shortcut icon" href="#" />
  <link href="/static/css/style.css" rel="stylesheet">
  <title>Главная</title>
</head>

<body>
  <header class="header container">
    <nav class="navbar navbar-expand-lg">
      <a class="navbar-brand logo-header" href="main">Банк</a>
      <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar">
        <div class="offcanvas-header">
          <h5 class="offcanvas-title">Меню</h5>
          <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a href="main" class="nav-link">Главная</a>
            </li>
            <li class="nav-item">
              <a href="transfer" class="nav-link">Перевести</a>
            </li>
            <li class="nav-item">
              <a href="analitics" class="nav-link">Аналитика</a>
            </li>
          </ul>
        </div>
      </div>
      <div class="side-actions">
      <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="profile-actions">
        <a href="logout"><i class="fa fa-sign-out fa-flip-horizontal" aria-hidden="true"></i></a>
        <a href="profile"><i class="fa fa-user" aria-hidden="true"></i></a>
      </div>
    </div>
    </nav>   
  </header>

  <main>
    <div class="main-container container">
      <section class="section-card">
        <div class="history-header">
          <h2>Кошелек</h2>
          <a href="history" class="link" id="new-card-btn">Добавить карту</a>
        </div>
        <div class="row">
          <ul id="card-list" class="col-8 col-sm-12 col-md-8 col-lg-9"></ul>
          
          <div class="fast-actions col-auto ms-auto">
            <h3 class="fast-actions-title">Быстрые действия</h3>
            <ul class="fast-actions-list">
              <li>
                <button type="button" class="secondary-btn"><a href="transfer">Перевести</a></button>
              </li>
              <li>
                <button type="button" class="secondary-btn"><a href="transfer">Пополнить</a></button>
              </li>
              <li>
                <button type="button" class="secondary-btn"><a href="#">Снять</a></button>
              </li>
            </ul>
          </div>
        </div>
      </section>

      <section class="section-recent section-history col">
        <div class="history-header">
          <h2>Последняя активность</h2>
          <a href="history" class="link">Вся история</a>
        </div>
        <ul id="recent-list" class="col-auto"></ul>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/static/js/main.js"></script>
</body>
</html>
