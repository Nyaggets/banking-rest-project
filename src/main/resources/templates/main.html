<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://getbootstrap.com/docs/5.3/assets/css/docs.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="shortcut icon" href="#" />
  <link href="/static/css/style.css" rel="stylesheet">
  <title>Главная</title>
</head>

<body>
  <header class="header container">
    <nav class="navbar navbar-expand-lg">
      <a class="navbar-brand nav-link" href="main">Банк</a>
      <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar">
        <div class="offcanvas-header">
          <a class="offcanvas-title nav-link" href="main">Банк</a> 
          <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a href="transfer" class="nav-link">Перевести</a>
            </li>
            <li class="nav-item">
              <a href="history" class="nav-link">История</a>
            </li>
          </ul>
        </div>
      </div>
      <div class="side-actions">
      <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="profile-actions">
        <a href="profile" class="nav-link"><i class="fa fa-user" aria-hidden="true"></i><label id="profile-login"></label></a>
        <a href="logout" class="nav-link"><i class="fa fa-sign-out fa-flip-horizontal p-0" aria-hidden="true"></i></a>
      </div>
    </div>
    </nav>   
  </header>

  <main>
    <div class="main-container container">
      <section class="section-card">
        <h2>Кошелек</h2>
        <div class="wallet-layout">
          <ul id="card-list" class="card-list"></ul>
          
          <aside class="fast-actions">
            <h3 class="fast-actions-title">Быстрые действия</h3>
            <div class="fast-actions-list">
              <button type="button" class="secondary-btn"><a href="transfer?type=EXTERNAL">Перевести</a></button>
              <button type="button" class="secondary-btn"><a href="transfer?type=INTERNAL">Перевод между своими</a></button>
            </div>
          </aside>
        </div>
      </section>

      <section class="section-recent section-history col">
        <div class="history-header">
          <h2>Последняя активность</h2>
          <a href="history" class="link">Вся история</a>
        </div>
        <ul id="recent-list" class="col-auto"></ul>

        <button class="main-btn mt-4 d-flex mx-auto" id="history-btn">Вся история</button>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/static/js/main.js"></script>
</body>
</html>
