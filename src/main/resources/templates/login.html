<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../static/css/style.css">
  <title>Вход</title>
</head>

<body>
  <div id="spinner" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; justify-content: center; 
  align-items: center; background: #fcfcfc; z-index: 9999;">
    <div class="spinner-grow text-primary" role="status" style="width: 3rem; height: 3rem; background-color: #f67737;">
      <span class="visually-hidden">Загрузка...</span>
    </div>
  </div>

  <div class="toast position-fixed mt-3 top-0 start-50 translate-middle-x" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true" data-bs-delay="1500">
      <div class="toast-header">
        <strong class="me-auto" id="toast-header"></strong>
        <small>Только что</small>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div class="toast-body" id="toast-body">
      </div>
    </div>

  <header class="header container-md">
    <nav class="navbar navbar-expand-lg">
      <a class="navbar-brand nav-link">Банк</a>
    </div>
    </nav>   
  </header>

  <main>
    <div class="auth-container container">
      <h1 class="greeting">Здравствуйте</h1>
      <h2 class="auth-title">Вход</h2>
      <form id="auth-form" class="auth-form" method="post" action="/login">
        <input type="text" name="username" id="username" class="input" placeholder="Логин/телефон" maxlength="100" required>
        <input type="password" name="password" id="password" class="input" placeholder="Пароль" maxlength="100" required>
        <div error-for="login" class="error-msg" hidden></div>
        <button type="submit" id="auth-button" class="main-btn">Войти</button>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./static/js/login.js"></script>
</body>
</html>
