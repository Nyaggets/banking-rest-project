<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="../static/css/style.css" rel="stylesheet">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <title>Карта</title>
</head>

<body>
  <div id="spinner" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; justify-content: center; 
  align-items: center; background: #fcfcfc; z-index: 9999;">
    <div class="spinner-grow text-primary" role="status" style="width: 3rem; height: 3rem; background-color: #f67737;">
      <span class="visually-hidden">Загрузка...</span>
    </div>
  </div>

  <div class="toast position-fixed mt-3 top-0 start-50 translate-middle-x" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true" data-bs-delay="1900">
    <div class="toast-header">
      <strong class="me-auto" id="toast-header"></strong>
      <small>Только что</small>
      <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
    <div class="toast-body" id="toast-body">
    </div>
  </div>

  <div class="modal fade" id="confirm-modal" tabindex="-1" aria-labelledby="confirm-modal-label" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="confirm-modal-label">Подтверждение личности</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="password-conf-form">
            <label for="password-input">Введите пароль от аккаунта</label>
            <input type="password" name="confirm-password" id="password-input" maxlength="100" autocomplete="off" required autofocus>
            <div error-for="client" class="error-msg" id="confirm-error" hidden></div>
            <div class="mt-3 d-flex justify-content-end gap-2">
              <button type="reset" class="secondary-btn modal-dismiss-btn" data-bs-dismiss="modal" autofocus>Отмена</button>
              <button type="submit" class="main-btn" id="password-conf-btn">Подтвердить</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="logout-modal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Подтверждение действия</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p>Выйти из аккаунта?</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="secondary-btn modal-dismiss-btn" data-bs-dismiss="modal" autofocus>Отмена</button>
          <a href="logout" role="button" class="btn btn-danger btn-link">Выйти</a>
        </div>
      </div>
    </div>
  </div>

  <header class="header container-md">
    <nav class="navbar navbar-expand-lg">
      <a class="navbar-brand nav-link" href="main">M·Банк</a>
      <div class="profile-actions">
        <a href="profile" class="nav-link"><i class="fa fa-user" aria-hidden="true"></i><label id="profile-login"></label></a>
        <a class="nav-link" data-bs-toggle="modal" data-bs-target="#logout-modal"><i class="fa fa-sign-out fa-flip-horizontal p-0" aria-hidden="true"></i></a>
      </div>
    </div>
    </nav>   
  </header>

  <main>
    <div class="main-container container-md">
      <h2>Детали карты</h2>

      <h3 error-for="card" class="error-msg" hidden></h3>
      <h3 error-for="client-card" class="error-msg" hidden></h3>

      <div id="card-data">
        <section id="section-card">
          <div id="card-container" class="card-item"></div>

          <div  id="card-stats">
            <h3 id="month-name"></h3>
            <h2 id="month-income"></h2>
            <h2 id="month-outcome"></h2>

            <div class="mt-5">
              <h2>Номер счёта</h2>
              <p id="account-number"></p>
            </div>
          </div>

          <aside class="fast-actions">
            <h3 class="fast-actions-title">Быстрые действия</h3>
            <div class="fast-actions-list">
              <a class="secondary-btn btn-link transfer-btn-ext" role="button">Перевод</a>
              <a class="secondary-btn btn-link transfer-btn-int" role="button">Перевод между своими</a>
              <a class="secondary-btn btn-link" id="withdrawal-btn" role="button">Пополнить баланс</a>
            </div>
          </aside>
        </section>

        <section id="card-history col">
          <div class="history-header">
            <h2>История операций</h2>
            <a id="card-history-link" class="link">Вся история</a>
          </div>
          <div id="history-msg" class="mx-auto" hidden></div>
          <ul id="card-history"></ul>
          <button class="main-btn mt-4 d-flex mx-auto" id="card-history-btn" role="button">Вся история</button>
        </section>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/static/js/card.js"></script>
</body>
</html>
