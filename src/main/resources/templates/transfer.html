<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="../static/css/style.css" rel="stylesheet">
  <title>Новый перевод</title>
</head>

<body>
  <div id="spinner" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; justify-content: center; 
  align-items: center; background: #fcfcfc; z-index: 9999;">
    <div class="spinner-grow text-primary" role="status" style="width: 3rem; height: 3rem; background-color: #f67737;">
      <span class="visually-hidden">Загрузка...</span>
    </div>
  </div>

  <div class="toast position-fixed mt-3 top-0 start-50 translate-middle-x" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true" data-bs-delay="1500">
    <div class="toast-header">
      <strong class="me-auto" id="toast-header"></strong>
      <small>Только что</small>
      <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
    <div class="toast-body" id="toast-body">
    </div>
  </div>

  <div class="modal fade" id="logout-modal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Подтверждение действия</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p>Выйти из аккаунта?</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="secondary-btn modal-dismiss-btn" data-bs-dismiss="modal" autofocus>Отмена</button>
          <a href="logout" role="button" class="btn btn-danger btn-link">Выйти</a>
        </div>
      </div>
    </div>
  </div>

  <header class="header container-md">
    <nav class="navbar navbar-expand-lg">
      <a class="navbar-brand nav-link" href="main">Банк</a>
      <div class="profile-actions">
        <a href="profile" class="nav-link"><i class="fa fa-user" aria-hidden="true"></i><label id="profile-login"></label></a>
        <a class="nav-link" data-bs-toggle="modal" data-bs-target="#logout-modal"><i class="fa fa-sign-out fa-flip-horizontal p-0" aria-hidden="true"></i></a>
      </div>
    </div>
    </nav>   
  </header>

  <main>
    <div class="main-container container-md">
      <div class="transfer-container">
        <h2>Новый перевод</h2>
        <div>
          <form id="transfer-form" class="row">
            <div class="transfer-field col-12 col-md-5">
              <h3>Получатель</h3>
              <div class="external-rec" hidden>  
                <input type="text" name="receiver" id="receiver" placeholder="Номер телефона/карты" maxlength="30" required>
                <p id="receiver-name" class="caption" hidden></p>
              </div>
              <div class="internal-rec" hidden>  
                <select name="receiver" id="receiver" class="receiver-cards-select"></select>
              </div>
              <div error-for="receiver" class="error-msg" hidden></div>
            </div>
            <div class="col-md-1 d-flex align-items-center justify-content-center">
              <i class="fa fa-exchange" aria-hidden="true"></i>
            </div>
            <div class="transfer-field col-12 col-md-5">
              <h3>Карта списания</h3>
              <select name="sender" id="sender-cards-select" required></select>
              <div error-for="sender" class="error-msg" hidden></div>
            </div>
            <div class="transfer-field col-12 col-md-5">
              <h3>Сумма перевода</h3>
              <div class="d-flex align-items-center gap-2 pe-2">
                <input type="text" inputmode="decimal" name="amount" id="amount" class="flex-grow-1 w-0" required maxlength="30">
                <label class="flex-shrink-0 mb-0 fs-5">₽</label>
              </div>
              <div error-for="amount" class="error-msg" hidden></div>
              <div class="amount-btns-row py-1">
                <button type="button" class="secondary-btn amount-btn">500₽</button>
                <button type="button" class="secondary-btn amount-btn">1 000₽</button>
                <button type="button" class="secondary-btn amount-btn">1 500₽</button>
              </div>
            </div>
            <div class="col col-md-1"></div>
            <div class="col-12 col-md-5">
              <h3>Сообщение (необязательно)</h3>
              <input type="text" name="description" id="description" maxlength="50">
              <p id="description-size" class="caption d-flex"></p>
              <div error-for="description" class="error-msg" hidden></div>
            </div>
          
            <div class="col">
              <p id="commission-amount">Комиссия: 0₽</p>
              <button type="submit" class="main-btn" id="transfer-btn">Перевести</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/static/js/transfer.js"></script>
</body>
</html>
