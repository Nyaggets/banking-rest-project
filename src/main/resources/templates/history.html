<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link href="../static/css/style.css" rel="stylesheet">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <title>История</title>
</head>

<body>
  <div id="spinner" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; justify-content: center; 
  align-items: center; background: #fcfcfc; z-index: 9999;">
    <div class="spinner-grow text-primary" role="status" style="width: 3rem; height: 3rem; background-color: #f67737;">
      <span class="visually-hidden">Загрузка...</span>
    </div>
  </div>

  <div class="modal fade" id="logout-modal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Подтверждение действия</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p>Выйти из аккаунта?</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="secondary-btn modal-dismiss-btn" data-bs-dismiss="modal" autofocus>Отмена</button>
          <a href="logout" role="button" class="btn btn-danger btn-link">Выйти</a>
        </div>
      </div>
    </div>
  </div>

  <header class="header container-md">
    <nav class="navbar navbar-expand-lg">
      <a class="navbar-brand nav-link" href="main">M·Банк</a>
      <div class="profile-actions">
        <a href="profile" class="nav-link"><i class="fa fa-user" aria-hidden="true"></i><label id="profile-login"></label></a>
        <a class="nav-link" data-bs-toggle="modal" data-bs-target="#logout-modal"><i class="fa fa-sign-out fa-flip-horizontal p-0" aria-hidden="true"></i></a>
      </div>
    </div>
    </nav>   
  </header>

  <main>
    <div class="toast position-fixed mt-3 top-0 start-50 translate-middle-x" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true" data-bs-delay="1900">
      <div class="toast-header">
        <strong class="me-auto" id="toast-header"></strong>
        <small>Только что</small>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div class="toast-body" id="toast-body">
      </div>
    </div>

    <div class="main-container container-md">
      <section class="history-container">
        <h2>История</h2>

        <div id="filters">
          <div class="d-flex flex-column flex-md-row gap-2">
            <select name="period-select" id="period-select" class="w-100 flex-md-fill">
              <option value="">Всё время</option>
              <option value="WEEK">Неделя</option>
              <option value="MONTH">Месяц</option>
              <option value="SIX_MONTHS">6 месяцев</option>
              <option value="PERIOD">Выбрать период</option>
            </select>

            <select name="card" id="counterparty-select" class="w-100 flex-md-fill">
              <option value="">Все карты</option>
            </select>

            <select name="type-select" id="type-select" class="w-100 flex-md-fill">
              <option value="">Все операции</option>
              <option value="transfer">Переводы</option>
              <option value="deposit">Пополнения</option>
              <option value="withdrawal">Расходы</option>
            </select>
          </div>
          <p id="selected-period" class="caption mt-1"></p>
          <input type="text" id="date-range-picker" autocomplete="off" hidden>
        </div>

        <div id="history-msg" hidden></div>
        <ul id="history-list"></ul>
        <nav aria-label="Page navigation example" id="pagination-nav" class="mt-1">
          <ul class="pagination">
            <div id="btns" class="d-flex"></div>
          </ul>
        </nav>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script type="module" src="/static/js/history.js"></script>
</body> 
</html>
