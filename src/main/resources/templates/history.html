<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link href="../static/css/style.css" rel="stylesheet">
  <title>История</title>
</head>

<body>
  <header class="header container">
    <nav class="navbar navbar-expand-lg">
      <a class="navbar-brand nav-link" href="main">Банк</a>
      <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar">
        <div class="offcanvas-header">
          <h5 class="offcanvas-title">Меню</h5>
          <button type="button" class="btn-close" errors-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a href="main" class="nav-link">Главная</a>
            </li>
            <li class="nav-item">
              <a href="transfer" class="nav-link">Перевести</a>
            </li>
            <li class="nav-item">
              <a href="analitics" class="nav-link">Аналитика</a>
            </li>
          </ul>
        </div>
      </div>
      <div class="side-actions">
      <button class="navbar-toggler" type="button" errors-bs-toggle="offcanvas" errors-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="profile-actions">
        <a href="logout"><i class="fa fa-sign-out fa-flip-horizontal" aria-hidden="true"></i></a>
        <a href="profile"><i class="fa fa-user" aria-hidden="true"></i></a>
      </div>
    </div>
    </nav>   
  </header>

  <main>
    <div class="main-container container">
      <section class="history-container">
        <h2>История</h2>

        <div id="filters">
          <select name="card" id="counterparty-select">
            <option value="">Все карты</option>
          </select>

          <select name="type-select" id="type-select">
            <option value="">Все операции</option>
            <option value="TRANSFER">Переводы</option>
            <option value="DEPOSIT">Пополнения</option>
            <option value="WITHDRAWAL">Расходы</option>
          </select>

          <select name="period-select" id="period-select">
            <option value="">Всё время</option>
            <option value="WEEK">Неделя</option>
            <option value="MONTH">Месяц</option>
            <option value="SIX_MONTHS">6 месяцев</option>
            <option value="PERIOD">Выбрать период</option>
          </select>
          <p id="selected-period" class="caption mt-1"></p>
          <input type="text" id="date-range-picker" hidden>
        </div>

        <div id="history-msg" hidden></div>
        <ul id="history-list"></ul>
        <nav aria-label="Page navigation example" id="pagination-nav" class="mt-1">
          <ul class="pagination">
            <div id="btns" class="d-flex"></div>
          </ul>
        </nav>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script type="module" src="/static/js/history.js"></script>
</body> 
</html>
