<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="../static/css/style.css" rel="stylesheet">
  <title>Детали операции</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
</head>

<body>
  <div id="spinner" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; justify-content: center; 
  align-items: center; background: #fcfcfc; z-index: 9999;">
    <div class="spinner-grow text-primary" role="status" style="width: 3rem; height: 3rem; background-color: #f67737;">
      <span class="visually-hidden">Загрузка...</span>
    </div>
  </div>

  <div class="modal fade" id="logout-modal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Подтверждение действия</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p>Выйти из аккаунта?</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="secondary-btn modal-dismiss-btn" data-bs-dismiss="modal" autofocus>Отмена</button>
          <a href="logout" role="button" class="btn btn-danger btn-link">Выйти</a>
        </div>
      </div>
    </div>
  </div>

  <header class="header container-md">
    <nav class="navbar navbar-expand-lg">
      <a class="navbar-brand nav-link" href="main">M·Банк</a>
      <div class="profile-actions">
        <a href="profile" class="nav-link"><i class="fa fa-user" aria-hidden="true"></i><label id="profile-login"></label></a>
        <a class="nav-link" data-bs-toggle="modal" data-bs-target="#logout-modal"><i class="fa fa-sign-out fa-flip-horizontal p-0" aria-hidden="true"></i></a>
      </div>
    </div>
    </nav>   
  </header>

  <main>
    <div class="main-container container-md">
      <h2>Детали операции</h2>

      <h3 error-for="transaction" class="error-msg" hidden></h3>
      <h3 error-for="client" class="error-msg" hidden></h3>

      <div id="transaction-data">
        <div id="operation-title-container" class="mt-4">
          <h1 id="amount"></h1>
          <h1 id="operation-title"></h1>
        </div>

        <hr class="mt-4 mb-5">

        <div class="row">
          <div class="col-12 col-md-6 mb-5">
            <div id="counterparty-container" class="mb-4"></div>
            <div id="client-container"></div>
          </div>

          <div class="col-12 col-md-6 mb-5">
            <p class="detail-label caption mb-1"><i class="fa-solid fa-calendar me-2"></i>Дата и время</p>
            <h3 id="date" class="mb-0"></h3>
          </div>

          <div class="col-12 col-md-6 mb-5" id="commission"></div>

          <div class="col-12 col-md-6 mb-5" id="message-container"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/static/js/transaction.js"></script>
</body>

</html>
