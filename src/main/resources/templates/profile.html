<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="../static/css/style.css" rel="stylesheet">
  <title>Профиль</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
</head>

<body>
  <div id="spinner" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; justify-content: center; 
  align-items: center; background: #fcfcfc; z-index: 9999;">
    <div class="spinner-grow text-primary" role="status" style="width: 3rem; height: 3rem; background-color: #f67737;">
      <span class="visually-hidden">Загрузка...</span>
    </div>
  </div>

  <div class="toast position-fixed mt-3 top-0 start-50 translate-middle-x" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true" data-bs-delay="1900">
    <div class="toast-header">
      <strong class="me-auto" id="toast-header"></strong>
      <small>Только что</small>
      <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
    <div class="toast-body" id="toast-body">
    </div>
  </div>
  
  <div class="modal fade" id="confirm-modal" tabindex="-1" aria-labelledby="confirm-modal-label" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="confirm-modal-label">Подтверждение личности</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="password-conf-form">
            <label for="password-input">Введите пароль от аккаунта</label>
            <input type="password" name="confirm-password" id="password-input" autocomplete="off" maxlength="100" required autofocus>
            <div error-for="client" class="error-msg" id="confirm-error" hidden></div>
            <div class="mt-3 d-flex justify-content-end gap-2">
              <button type="reset" class="secondary-btn modal-dismiss-btn" data-bs-dismiss="modal" autofocus>Отмена</button>
              <button type="submit" class="main-btn" id="password-conf-btn">Подтвердить</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="logout-modal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Подтверждение действия</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p>Выйти из аккаунта?</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="secondary-btn modal-dismiss-btn" data-bs-dismiss="modal" autofocus>Отмена</button>
          <a href="logout" role="button" class="btn btn-danger btn-link">Выйти</a>
        </div>
      </div>
    </div>
  </div>

  <header class="header container-md">
    <nav class="navbar navbar-expand-lg">
      <a class="navbar-brand nav-link" href="main">M·Банк</a>
      <div class="profile-actions">
        <a href="profile" class="nav-link"><i class="fa fa-user" aria-hidden="true"></i><label id="profile-login"></label></a>
        <a class="nav-link" data-bs-toggle="modal" data-bs-target="#logout-modal"><i class="fa fa-sign-out fa-flip-horizontal p-0" aria-hidden="true"></i></a>
      </div>
    </div>
    </nav>   
  </header>

  <main>
    <div class="main-container container-md">
      <h2 id="profile-header">Профиль</h2>

      <div class="row" id="profile-container">
        <div class="col-md-6">
          <section>
            <h3>Личные данные</h3>
            <form id="data-form">
              <div class="mb-3">
                <label class="caption">Телефон</label> 
                <input type="text" id="phone" autocomplete="off" maxlength="17">
                <div error-for="phone" class="error-msg" hidden></div>
              </div>
              <div class="mb-3">
                <label class="caption">Логин</label> 
                <input type="text" id="login" autocomplete="off" maxlength="100">
                <div error-for="login" class="error-msg" hidden></div>
              </div>
              <button type="submit" class="main-btn" id="change-data-btn">Сохранить изменения</button>
            </form>
          </section>

          <section>
            <h3>Безопасность</h3>
            <button class="secondary-btn" type="button" data-bs-toggle="collapse" data-bs-target="#passwordCollapse" aria-expanded="false">
              Изменить пароль
            </button>
            <div class="collapse mt-3" id="passwordCollapse">
              <form id="password-form" class="d-flex flex-column gap-2">
                <div class="mb-3">
                  <label class="caption">Текущий пароль</label> 
                  <input type="password" autocomplete="off" id="old-password" name="oldPassword" placeholder="Текущий пароль" maxlength="100" required>
                  <div error-for="oldPassword" class="error-msg" hidden></div>
                </div>
                <div class="mb-3">
                  <label class="caption">Новый пароль</label> 
                  <input type="password" autocomplete="off" id="new-password" name="newPassword" placeholder="Новый пароль" maxlength="100" required>
                  <div error-for="newPassword" class="error-msg" hidden></div>
                </div>
                <div class="mb-3">
                  <label class="caption">Подтверждение пароля</label> 
                  <input type="password" autocomplete="off" id="conf-password" name="passwordConf" placeholder="Подтвердите новый пароль" maxlength="100" required>
                  <div error-for="passwordConf" class="error-msg" hidden></div>
                </div>  
                <button type="submit" class="main-btn" id="change-password-btn">Сохранить изменения</button>
              </form>
            </div>
          </section>
        </div>
        
        <div class="col-md-6">
          <h3>Данные паспорта</h3>
          <button class="secondary-btn" id="passport-collapse-btn" type="button">
            Показать
          </button>
          <div class="collapse" id="passport-collpase">
            <div class="passport">
              <div class="mb-3">
                <label class="caption">Серия</label> 
                <p id="series"></p>
              </div>
              <div class="mb-3">
                <label class="caption">Номер</label> 
                <p id="number"></p>
              </div>
              <div class="mb-3">
                <label class="caption">Имя</label> 
                <p id="full-name"></p>
              </div>
              <div class="mb-3">
                <label class="caption">Код департамента</label> 
                <p id="department-code"></p>
              </div>
              <div class="mb-3">
                <label class="caption">Выдан</label> 
                <p id="issued-by" class="d-flex flex-wrap"></p>
              </div>
              <div class="mb-3">
                <label class="caption">Дата выдачи</label> 
                <p id="issue-date"></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/static/js/profile.js"></script>
</body>
</html>
